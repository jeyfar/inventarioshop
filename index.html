<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Gestor de Inventario - Tienda</title>
    <!-- Enlazamos el archivo de estilos externos -->
    <link rel="stylesheet" href="styles.css">
    <!-- Fuente de Google Fonts para tipografía moderna -->
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
</head>
<body>

    <!-- ============================================= -->
    <!-- CABECERA: Contiene el título, buscador y carrito -->
    <!-- ============================================= -->
    <header class="header">
        <div class="header-content">
            <!-- Título principal de la aplicación -->
            <h1 class="logo">📦 InventarioShop</h1>

            <!-- Barra de búsqueda: filtra productos por nombre en tiempo real -->
            <div class="search-box">
                <input type="text" id="searchInput" placeholder="Buscar producto..." autocomplete="off">
                <span class="search-icon">🔍</span>
            </div>

            <!-- Botón del carrito con contador de items -->
            <button class="cart-btn" id="cartBtn" title="Ver carrito">
                🛒 Carrito <span class="cart-count" id="cartCount">0</span>
            </button>
        </div>
    </header>

    <!-- ============================================= -->
    <!-- CONTENIDO PRINCIPAL -->
    <!-- ============================================= -->
    <main class="main-container">

        <!-- Barra lateral de filtros y acciones -->
        <aside class="sidebar">
            <!-- Botón para abrir modal y agregar nuevo producto -->
            <button class="btn btn-primary btn-full" id="btnAddProduct">
                + Nuevo Producto
            </button>

            <!-- Filtro por categoría: generado dinámicamente desde JS -->
            <div class="filter-section">
                <h3>Categorías</h3>
                <div class="filter-list" id="categoryFilter">
                    <!-- Los botones de filtro se insertan aquí con JS -->
                </div>
            </div>

            <!-- Resumen de estadísticas -->
            <div class="stats-section">
                <h3>Resumen</h3>
                <div class="stat-card">
                    <span class="stat-value" id="totalProducts">0</span>
                    <span class="stat-label">Productos</span>
                </div>
                <div class="stat-card">
                    <span class="stat-value" id="totalValue">$0</span>
                    <span class="stat-label">Valor total</span>
                </div>
            </div>
        </aside>

        <!-- Área de visualización de productos -->
        <section class="products-area">
            <!-- Encabezado con contador de resultados -->
            <div class="products-header">
                <h2 id="resultsTitle">Todos los productos</h2>
                <span class="results-count" id="resultsCount">0 resultados</span>
            </div>

            <!-- Grid donde se renderizan las tarjetas de producto desde JS -->
            <div class="products-grid" id="productsGrid">
                <!-- Las tarjetas se crean dinámicamente con el DOM -->
            </div>

            <!-- Mensaje cuando no hay productos -->
            <div class="empty-state" id="emptyState" style="display: none;">
                <div class="empty-icon">📭</div>
                <p>No se encontraron productos.</p>
            </div>
        </section>
    </main>

    <!-- ============================================= -->
    <!-- MODAL: Formulario para Agregar / Editar Producto -->
    <!-- Se muestra/oculta manipulando el DOM (classList) -->
    <!-- ============================================= -->
    <div class="modal-overlay" id="productModal">
        <div class="modal">
            <!-- Cabecera del modal -->
            <div class="modal-header">
                <h2 id="modalTitle">Agregar Producto</h2>
                <!-- Botón para cerrar el modal -->
                <button class="modal-close" id="modalClose">&times;</button>
            </div>

            <!-- Formulario de producto -->
            <form class="modal-form" id="productForm">
                <!-- Campo oculto para guardar el ID del producto en edición -->
                <input type="hidden" id="productId">

                <div class="form-group">
                    <label for="productName">Nombre del producto *</label>
                    <input type="text" id="productName" required placeholder="Ej: Laptop Dell XPS">
                </div>

                <div class="form-row">
                    <div class="form-group">
                        <label for="productPrice">Precio (USD) *</label>
                        <input type="number" id="productPrice" min="0" step="0.01" required placeholder="0.00">
                    </div>
                    <div class="form-group">
                        <label for="productStock">Cantidad en stock *</label>
                        <input type="number" id="productStock" min="0" required placeholder="0">
                    </div>
                </div>

                <div class="form-group">
                    <label for="productCategory">Categoría *</label>
                    <select id="productCategory" required>
                        <option value="">Seleccione...</option>
                        <option value="electronica">Electrónica</option>
                        <option value="ropa">Ropa</option>
                        <option value="hogar">Hogar</option>
                        <option value="deportes">Deportes</option>
                        <option value="alimentos">Alimentos</option>
                    </select>
                </div>

                <div class="form-group">
                    <label for="productImage">URL de imagen (opcional)</label>
                    <input type="url" id="productImage" placeholder="https://...">
                </div>

                <!-- Botones de acción del formulario -->
                <div class="modal-actions">
                    <button type="button" class="btn btn-secondary" id="btnCancel">Cancelar</button>
                    <button type="submit" class="btn btn-primary">Guardar Producto</button>
                </div>
            </form>
        </div>
    </div>

    <!-- ============================================= -->
    <!-- SIDEBAR DEL CARRITO: Se desliza desde la derecha -->
    <!-- ============================================= -->
    <div class="cart-overlay" id="cartOverlay"></div>
    <div class="cart-sidebar" id="cartSidebar">
        <div class="cart-header">
            <h2>🛒 Tu Carrito</h2>
            <button class="cart-close" id="cartClose">&times;</button>
        </div>

        <!-- Lista de items en el carrito -->
        <div class="cart-items" id="cartItems">
            <!-- Se llena dinámicamente con JS -->
        </div>

        <!-- Footer con total y botón de acción -->
        <div class="cart-footer">
            <div class="cart-total">
                <span>Total:</span>
                <span class="total-amount" id="cartTotal">$0.00</span>
            </div>
            <button class="btn btn-primary btn-full" id="btnCheckout">Proceder al pago</button>
        </div>
    </div>

    <!-- Toast de notificaciones -->
    <div class="toast-container" id="toastContainer"></div>

    <!-- ============================================= -->
    <!-- SCRIPTS: Enlazamos el JavaScript al final del body -->
    <!-- para asegurar que el DOM ya esté cargado -->
    <!-- ============================================= -->
    <script src="app.js"></script>
</body>
</html>
